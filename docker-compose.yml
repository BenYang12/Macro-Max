#My app needs Postgres and Redis running before I can do anything
#I could install both, but then my machine's Postgres 15 vs. CI's Postgres 16 vs. a teammate's Postgres 14 all behave differently
#Thus, I need to declare infrastructure as a file in the repo
#Anyone runs one command and gets the identical environment

#docker-compose.yml -> local development infrastructure
#describes the SERVICES my app depends on

# Handy commands:
#   docker compose up -d      start everything in the background (-d = detached)
#   docker compose ps         see status + health of each service
#   docker compose logs -f    tail the logs
#   docker compose down       stop (data survives in the named volume)
#   docker compose down -v    stop AND delete data volumes (fresh start)

services:
  postgres:
    # Image pinning (name:tag) -> tag pins the major version
    image: postgres:16-alpine

    # Port mapping (host:container) -> inside container Postgres listens on 5432
    # mapping publishes it on my Mac's localhost:5432
    ports:
      - "5432:5432"

    #First-boot environment variables
    environment:
      POSTGRES_USER: macrocart
      POSTGRES_PASSWORD: macrocart
      POSTGRES_DB: macrocart
    # a volume is a persistent storage mechanism managed by Docker that saves data outside of a container's ephemeral file system. Because Docker containers are designed to be temporary and easily replaced, any data created inside them is permanently lost when the container is deleted.
    # named volume = database's real home
    volumes:
      - pgdata:/var/lib/postgresql/data # mounts the volume at the path where Postgres keeps its files

    # Healthcheck answers "is Postgres actually READY?" rather than "is the
    # container running?" — Postgres takes a moment to accept connections
    # after the process starts. pg_isready ships with Postgres for exactly this.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U macrocart -d macrocart"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine # (name: tag)
    ports:
      - "6379:6379" #port mapping
    # No volume: Redis is a CACHE for us. Losing it costs a few re-computed
    # solves, nothing more — and an empty Redis after restart is a good test
    # that nothing incorrectly treats the cache as durable storage.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"] # replies "PONG" when ready
      interval: 5s
      timeout: 3s
      retries: 10

  # Top-level declaration of named volumes referenced above. Docker creates and
  # manages them; `docker volume ls` shows them.
volumes:
  pgdata:
